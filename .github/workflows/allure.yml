name: Deploy Allure Report with Trends and Environment

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:

    runs-on: windows-latest

    steps:

      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Prepare Allure results folder
      - name: Prepare Allure Results Folder
        shell: pwsh
        run: |
          if (-Not (Test-Path -Path "target\allure-results")) {
            New-Item -ItemType Directory -Path "target\allure-results"
          }

      # 3️⃣ Copy environment properties for Environment tab
      - name: Copy Allure Environment
        shell: pwsh
        run: Copy-Item -Path "allure-config\environment.properties" -Destination "target\allure-results\environment.properties" -Force

      # 4️⃣ Copy previous history for Trends tab
      - name: Copy Allure History
        shell: pwsh
        run: |
          if (Test-Path -Path "allure-history") {
            Copy-Item -Path "allure-history\*" -Destination "target\allure-results" -Recurse -Force
          }

      # 5️⃣ Deploy the manually committed report to GitHub Pages
      - name: Deploy Existing Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/allure-report
